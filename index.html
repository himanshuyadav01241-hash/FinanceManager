<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>INSANE HR FinanceOS Cloud</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
</head>

<body data-theme="dark">

    <!-- LOGIN SCREEN -->
    <div id="authScreen" class="authScreen">
        <div class="authCard">
            <i class="fa-solid fa-wallet"></i>
            <h1>INSANE HR</h1>
            <p>FinanceOS Cloud Edition</p>

            <!-- Only Google Sign-In Active -->
            <button id="googleBtn" style="background-color: #4285F4; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; width: 100%;">
                <i class="fa-brands fa-google"></i> Continue with Google
            </button>
        </div>
    </div>

    <!-- MAIN APP -->
    <div class="container" id="app" style="display:none;">

        <header style="display: flex; flex-direction: column; gap: 16px; padding: 20px 16px; border-bottom: 1px solid var(--border-color, rgba(255,255,255,0.1));">
            <div class="logo" style="display: flex; align-items: center; gap: 12px;">
                <i class="fa-solid fa-wallet" style="font-size: 1.6rem; color: #4285F4;"></i>
                <div>
                    <h1 style="margin: 0; font-size: 1.35rem; font-weight: 600; letter-spacing: -0.5px;">INSANE HR</h1>
                    <span style="font-size: 0.8rem; opacity: 0.6; display: block; margin-top: 4px;">FinanceOS Cloud</span>
                </div>
            </div>

            <!-- Sleek, Balanced Control Panel -->
            <div class="themeBox" style="display: flex; gap: 8px; width: 100%; box-sizing: border-box;">
                <select id="theme" style="flex: 2; padding: 10px 12px; font-size: 0.9rem; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: inherit; height: 42px; outline: none;">
                    <option value="dark">🌙 Dark</option>
                    <option value="light">☀️ Light</option>
                    <option value="red">❤️ Red</option>
                    <option value="blue">💙 Blue</option>
                    <option value="purple">💜 Purple</option>
                </select>

                <button id="logoutBtn" style="flex: 1; padding: 0 12px; font-size: 0.85rem; font-weight: 500; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.08); color: inherit; height: 42px; cursor: pointer; white-space: nowrap; transition: background 0.2s;">
                    Logout
                </button>

                <button id="deleteAccountBtn" style="flex: 1; padding: 0 12px; font-size: 0.85rem; font-weight: 500; border-radius: 8px; border: 1px solid #d9534f; background: transparent; color: #d9534f; height: 42px; cursor: pointer; white-space: nowrap; transition: all 0.2s;">
                    Delete
                </button>
            </div>
        </header>

        <!-- DASHBOARD -->
        <section class="cards">
            <div class="card">
                <h3>Net Balance</h3>
                <h2 id="balance">₹0</h2>
            </div>

            <div class="card income">
                <h3>Total Income</h3>
                <h2 id="income">₹0</h2>
            </div>

            <div class="card expense">
                <h3>Total Expense</h3>
                <h2 id="expense">₹0</h2>
            </div>

            <div class="card saving">
                <h3>Savings</h3>
                <h2 id="saving">₹0 (0%)</h2>
                <div id="healthBadge" class="badge">Awaiting Data</div>
            </div>

            <div class="card pending-summary-card">
                <h3>Pending</h3>
                <div class="pending-split-metrics">
                    <span class="incomeText">
                        In: <strong id="pendingIncome">₹0</strong>
                    </span>
                    <span class="expenseText">
                        Out: <strong id="pendingExpense">₹0</strong>
                    </span>
                </div>
            </div>
        </section>

        <!-- ENTRY FORMS -->
        <div class="finance-workspace">
            <section class="form">
                <h2>Add Transaction</h2>
                <input type="text" id="title" placeholder="Transaction Name">
                <input type="number" id="amount" placeholder="Amount">

                <select id="type">
                    <option value="income">💰 Income</option>
                    <option value="expense">💸 Expense</option>
                </select>

                <select id="category"></select>

                <select id="status">
                    <option value="paid">✅ Paid</option>
                    <option value="pending">⏳ Pending</option>
                </select>

                <button id="addBtn">
                    <i class="fa-solid fa-circle-plus"></i> Add Transaction
                </button>
            </section>

            <section class="form">
                <h2>Categories</h2>
                <div class="categoryManager">
                    <input id="newCategory" placeholder="New Category">
                    <button id="addCategory">+</button>
                </div>
                <div id="categoryList"></div>
            </section>
        </div>

        <!-- SEARCH, FILTERS & ACTION REGION -->
        <section class="search-filters" style="display: flex; flex-wrap: wrap; gap: 12px; padding: 16px; width: 100%; box-sizing: border-box;">
            
            <!-- Search Control Box -->
            <div class="search-box" style="flex: 1 1 200px; display: flex; align-items: center; position: relative;">
                <i class="fa-solid fa-magnifying-glass" style="position: absolute; left: 12px; opacity: 0.5;"></i>
                <input id="search" placeholder="Search" style="width: 100%; padding: 12px 12px 12px 36px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: inherit; outline: none;">
            </div>

            <!-- Viewport Category Filtering Box -->
            <div class="filter-box" style="flex: 1 1 150px; display: flex; align-items: center; position: relative;">
                <i class="fa-solid fa-filter" style="position: absolute; left: 12px; opacity: 0.5; z-index: 2;"></i>
                <select id="filterCategory" style="width: 100%; padding: 12px 12px 12px 36px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: inherit; outline: none; appearance: none; -webkit-appearance: none; cursor: pointer;">
                    <option value="all">All Categories</option>
                </select>
            </div>

            <!-- Action Controls Grouping Row (Maintains equal distribution sizes) -->
            <div style="flex: 2 1 300px; display: flex; gap: 8px;">
                <!-- Unified Excel Spreadsheet Download Trigger -->
                <button id="exportBtn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 12px; font-size: 0.85rem; font-weight: 500; border-radius: 8px; border: 1px solid #4285F4; background: rgba(66, 133, 244, 0.1); color: #4285F4; cursor: pointer; white-space: nowrap; transition: all 0.2s; outline: none;">
                    <i class="fa-solid fa-file-excel"></i> Excel Download
                </button>

                <!-- Clean Entire Active Selected Category Set -->
                <button id="purgeCategoryBtn" style="flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px 12px; font-size: 0.85rem; font-weight: 500; border-radius: 8px; border: 1px solid #d9534f; background: rgba(217, 83, 79, 0.1); color: #d9534f; cursor: pointer; white-space: nowrap; transition: all 0.2s; outline: none;">
                    <i class="fa-solid fa-trash-can"></i> Purge View
                </button>
            </div>
            
        </section>

        <!-- TRANSACTION HISTORY -->
        <section class="ledger">
            <h2>Transactions History</h2>
            <ul id="transactionList"></ul>
        </section>

        <footer>
            Made with ❤️ by <strong>INSANE HR</strong>
        </footer>

    </div>

    <!-- MODERN INTERACTIVE DIALOG MODAL SYSTEM -->
    <div id="customModalOverlay" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.65); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); z-index: 9999; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box;">
        <div style="background: var(--card-bg, #1e1e1e); color: var(--text-color, #ffffff); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; width: 100%; max-width: 400px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); padding: 24px; transform: scale(0.9); transition: transform 0.2s ease; box-sizing: border-box; text-align: center;">
            <div id="modalIconContainer" style="font-size: 2.5rem; margin-bottom: 12px; color: #d9534f;">
                <i class="fa-solid fa-triangle-exclamation"></i>
            </div>
            <h3 id="modalTitle" style="margin: 0 0 10px 0; font-size: 1.25rem; font-weight: 600;">Confirm Action</h3>
            <p id="modalDescription" style="margin: 0 0 24px 0; font-size: 0.9rem; line-height: 1.5; opacity: 0.8; word-wrap: break-word;"></p>
            
            <!-- Contextual Verification Input Layout (Hidden by default, shown for critical purges) -->
            <input id="modalConfirmationInput" type="text" placeholder="Type here to verify..." style="display: none; width: 100%; padding: 10px 12px; margin-bottom: 20px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.2); background: rgba(0,0,0,0.2); color: inherit; outline: none; box-sizing: border-box; text-align: center;">
            
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button id="modalCancelBtn" style="flex: 1; padding: 10px 16px; font-size: 0.9rem; font-weight: 500; border-radius: 6px; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05); color: inherit; cursor: pointer; transition: background 0.2s;">Cancel</button>
                <button id="modalConfirmBtn" style="flex: 1; padding: 10px 16px; font-size: 0.9rem; font-weight: 500; border-radius: 6px; border: none; background: #d9534f; color: white; cursor: pointer; transition: opacity 0.2s;">Confirm</button>
            </div>
        </div>
    </div>

    <!-- DIAGNOSTIC OVERRIDE BARRIER -->
    <script>
        console.log("💥 SYSTEM CHECK 1: HTML execution engine is alive.");
        window.onerror = function(message, source, lineno, colno, error) {
            alert("🔴 MODULE INITIALIZATION FAULT:\n" + message + "\nLine: " + lineno + "\nFile: " + source);
            return false;
        };
    </script>

    <!-- Finance Logic Engine -->
    <script type="module" src="script.js"></script>

</body>
</html>
