<!DOCTYPE html>
<html lang="en" data-theme="sakura">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinanceOs</title>
    <link rel="icon" type="image/png" href="https://img.icons8.com/fluency/48/wallet.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* ==========================================
           1. CORE DESIGN THEMES (2 THEMES)
           ========================================== */
        :root, [data-theme="sakura"] {
            --bg-main: #ffebee;
            --bg-surface: #ffffff;
            --bg-input: #fff5f5;
            --text-primary: #4a1525;
            --text-muted: #9c4d66;
            --border-color: rgba(156, 77, 102, 0.15);
            --primary-accent: #ff8da1;
            --danger-accent: #e57373;
            --success-accent: #81c784;
            --warning-accent: #ffb74d;
        }

        [data-theme="light-blue"] {
            --bg-main: #f0f4f8;
            --bg-surface: #ffffff;
            --bg-input: #e1e9f0;
            --text-primary: #102a43;
            --text-muted: #486581;
            --border-color: rgba(16, 42, 67, 0.08);
            --primary-accent: #2196f3;
            --danger-accent: #d93025;
            --success-accent: #188038;
            --warning-accent: #e37400;
        }

        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-primary);
            margin: 0;
            padding: 0;
            transition: background 0.3s, color 0.3s;
        }

        /* ==========================================
           2. AUTHENTICATION SCREENS & DESIGN
           ========================================== */
        #authScreen {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            background: linear-gradient(135deg, rgba(255, 235, 238, 0.65) 0%, rgba(255, 255, 255, 0.45) 100%);
        }

        .auth-card {
            background: #ffffff;
            padding: 40px 35px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(74, 21, 37, 0.12);
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        .auth-brand {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
        }

        .auth-brand h2 { margin: 0; font-size: 1.8rem; font-weight: 700; }
        .auth-form { text-align: left; }
        .auth-form .form-group { margin-bottom: 18px; display: flex; flex-direction: column; gap: 6px; }
        .auth-form input {
            width: 100%; padding: 12px 14px; background: #fcf8f9;
            border: 1px solid rgba(156, 77, 102, 0.25); border-radius: 8px; outline: none;
        }

        .auth-btn-primary {
            width: 100%; background: #ff6b84; color: white; border: none;
            padding: 14px; font-weight: 600; border-radius: 8px; cursor: pointer;
        }

        /* ==========================================
           3. DASHBOARD WORKSPACE LAYOUT
           ========================================== */
        #app { display: none; padding: 15px; max-width: 1300px; margin: 0 auto; }
        
        header {
            display: flex; flex-direction: column; gap: 15px;
            margin-bottom: 25px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px;
        }

        .user-controls { display: flex; flex-wrap: wrap; align-items: center; gap: 10px; width: 100%; }
        .user-controls select, .user-controls button { flex: 1; min-width: 120px; text-align: center; }
        
        select, input, button {
            background: var(--bg-input); color: var(--text-primary);
            border: 1px solid var(--border-color); padding: 10px 14px; border-radius: 6px; outline: none;
        }
        
        button { cursor: pointer; font-weight: 500; }
        .danger-btn { background: var(--danger-accent); color: white; border: none; }

        .metrics-grid { display: grid; grid-template-columns: 1fr; gap: 16px; margin-bottom: 25px; }
        .card { background: var(--bg-surface); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); position: relative; }
        .badge { position: absolute; top: 15px; right: 15px; font-size: 0.75rem; padding: 4px 8px; border-radius: 12px; font-weight: bold; }
        .badge-good { background: rgba(15, 157, 88, 0.2); color: var(--success-accent); }
        .badge-warn { background: rgba(244, 180, 0, 0.2); color: var(--warning-accent); }
        .badge-danger { background: rgba(217, 83, 79, 0.2); color: var(--danger-accent); }

        .workspace-layout { display: grid; grid-template-columns: 1fr; gap: 20px; }
        .panel { background: var(--bg-surface); padding: 20px; border-radius: 8px; border: 1px solid var(--border-color); }
        .panel h3 { margin-top: 0; margin-bottom: 20px; font-size: 1.2rem; }

        .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
        .form-group label { font-size: 0.85rem; color: var(--text-muted); font-weight: 500; }
        .form-row-mixed { display: grid; grid-template-columns: 1fr; gap: 12px; }
        .checkbox-row { flex-direction: row; align-items: center; gap: 8px; margin-top: 8px; }

        .filter-ribbon { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 12px; }
        .date-row { display: grid; grid-template-columns: 1fr; gap: 10px; margin-bottom: 16px; }
        
        /* Ledger List Items Layout */
        .transaction-ledger { list-style: none; padding: 0; margin: 0; }
        .transaction-item {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-bottom: 1px solid var(--border-color); background: var(--bg-surface);
        }
        .transaction-item:hover { background: var(--bg-input); }

        /* Dynamic Status Utility Items */
        .status-pill { 
            font-weight: bold; text-transform: uppercase; border-radius: 4px; 
            padding: 4px 8px; font-size: 0.75rem; cursor: pointer; border: 1px solid transparent;
        }
        .status-pill:hover { border-color: var(--text-primary); }
        .status-paid { background: rgba(15, 157, 88, 0.15); color: var(--success-accent); }
        .status-pending { background: rgba(244, 180, 0, 0.15); color: var(--warning-accent); }

        /* Dialog/Modal Styling Structures */
        .modal-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center;
            z-index: 1000; padding: 20px;
        }
        .modal-content {
            background: var(--bg-surface); padding: 30px; border-radius: 12px;
            max-width: 450px; width: 100%; border: 1px solid var(--border-color); text-align: center;
        }
        .modal-inputs-wrapper input, .modal-inputs-wrapper select { width: 100%; margin-top: 15px; }
        .modal-buttons-wrapper { display: flex; gap: 12px; justify-content: center; margin-top: 25px; }

        @media (min-width: 768px) {
            header { flex-direction: row; justify-content: space-between; align-items: center; }
            .user-controls { width: auto; }
            .metrics-grid { grid-template-columns: repeat(2, 1fr); }
            .form-row-mixed { grid-template-columns: 1fr 1fr; }
            .filter-ribbon { grid-template-columns: 2fr 1fr; }
            .date-row { grid-template-columns: 1fr 1fr; }
        }
        @media (min-width: 992px) {
            .metrics-grid { grid-template-columns: repeat(4, 1fr); }
            .workspace-layout { grid-template-columns: repeat(12, 1fr); gap: 24px; }
            .col-left { grid-column: span 5; }
            .col-right { grid-column: span 7; }
        }
    </style>
</head>
<body>

    <!-- AUTHENTICATION SCREEN -->
    <div id="authScreen">
        <div class="auth-card">
            <div class="auth-brand"><h2>FinanceOs</h2></div>
            <form id="emailAuthForm" class="auth-form" onsubmit="return false;">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="authEmail" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="authPassword" placeholder="Password" required>
                </div>
                <button type="submit" id="customAuthBtn" class="auth-btn-primary">Sign In</button>
            </form>
            <button class="google-btn" id="googleBtn" style="margin-top: 10px; width:100%;">Sign in with Google</button>
        </div>
    </div>

    <!-- MAIN APP INTERFACE -->
    <div id="app">
        <header>
            <h1>FinanceOs</h1>
            <div class="user-controls">
                <select id="theme">
                    <option value="sakura">Cherry Blossom (Sakura)</option>
                    <option value="light-blue">Ocean Breeze (Light Blue)</option>
                </select>
                <button id="logoutBtn">Logout</button>
                <button id="deleteAccountBtn" class="danger-btn">Delete Account</button>
            </div>
        </header>

        <div class="metrics-grid">
            <div class="card">
                <small>TOTAL BALANCE</small><h2 id="balance">₹0</h2>
                <span id="healthBadge" class="badge">Checking...</span>
            </div>
            <div class="card">
                <small>INCOME</small><h2 id="income" class="incomeText">₹0</h2>
                <div id="pendingIncome" style="font-size:0.8rem;">Pending: ₹0</div>
            </div>
            <div class="card">
                <small>EXPENSES</small><h2 id="expense" class="expenseText">₹0</h2>
                <div id="pendingExpense" style="font-size:0.8rem;">Pending: ₹0</div>
            </div>
            <div class="card">
                <small>NET SAVINGS</small><h2 id="saving">0%</h2>
            </div>
        </div>

        <div class="workspace-layout">
            <div class="col-left">
                <div class="panel">
                    <h3>Add Transaction</h3>
                    <div class="form-group">
                        <label>Description</label>
                        <input type="text" id="title" placeholder="e.g., Office Rent, Salary">
                    </div>
                    <!-- Added Date Option Input Row -->
                    <div class="form-row-mixed">
                        <div class="form-group">
                            <label>Amount (₹)</label>
                            <input type="number" id="amount" placeholder="0.00">
                        </div>
                        <div class="form-group">
                            <label>Transaction Date</label>
                            <input type="date" id="transactionDate">
                        </div>
                    </div>
                    <div class="form-row-mixed">
                        <div class="form-group">
                            <label>Type</label>
                            <select id="type">
                                <option value="expense">Expense (-)</option>
                                <option value="income">Income (+)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Category</label>
                            <select id="category"></select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Initial Status</label>
                        <select id="status">
                            <option value="paid">Settled</option>
                            <option value="pending">Pending</option>
                        </select>
                    </div>
                    <button id="addBtn" style="width:100%; background: var(--primary-accent); color:white; border:none; padding:12px; font-weight:bold;">
                        Save Transaction
                    </button>
                </div>
            </div>

            <div class="col-right">
                <div class="panel">
                    <h3>Transaction History</h3>
                    <div class="filter-ribbon">
                        <input type="text" id="search" placeholder="Search...">
                        <select id="filterCategory"><option value="all">All Categories</option></select>
                    </div>
                    <div class="date-row">
                        <input type="date" id="startDate" title="Start">
                        <input type="date" id="endDate" title="End">
                    </div>
                    <ul id="transactionList" class="transaction-ledger"></ul>
                </div>
            </div>
        </div>
    </div>

    <!-- RECONFIGURABLE DIALOG OVERLAY SYSTEM -->
    <div class="modal-overlay" id="customModalOverlay">
        <div class="modal-content">
            <h3 id="modalTitle">Confirm Action</h3>
            <p id="modalDescription"></p>
            
            <div id="modalInputsWrapper" class="modal-inputs-wrapper" style="display: none;">
                <!-- Target Container for either confirmation strings or inline status toggles -->
                <div id="dynamicStatusField" style="display:none; margin-top:15px; text-align:left;">
                    <label style="font-size:0.85rem; font-weight:bold;">Update Status To:</label>
                    <select id="updatedStatusDropdown" style="width:100%; margin-top:5px;">
                        <option value="paid">Settled / Paid</option>
                        <option value="pending">Pending</option>
                    </select>
                </div>
                <input type="text" id="deleteConfirmationInput" placeholder="Type CONFIRM to proceed" style="display:none;">
            </div>

            <div class="modal-buttons-wrapper">
                <button id="modalCancelBtn">Cancel</button>
                <button id="modalConfirmBtn" class="danger-btn">Confirm</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="script.js"></script>
</body>
</html>
