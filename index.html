<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <title>INSANE HR FinanceOS Cloud</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">

</head>

<body data-theme="dark">

    <!-- LOGIN SCREEN -->

    <div id="authScreen" class="authScreen">

        <div class="authCard">

            <i class="fa-solid fa-wallet"></i>

            <h1>INSANE HR</h1>

            <p>FinanceOS Cloud Edition</p>

            <!-- Only Google Sign-In Active -->
            <button id="googleBtn" style="background-color: #4285F4; color: white; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 20px; width: 100%;">
                <i class="fa-brands fa-google"></i> Continue with Google
            </button>

        </div>

    </div>

    <!-- MAIN APP -->

    <div class="container" id="app" style="display:none;">

        <header style="display: flex; flex-direction: column; gap: 15px; padding: 15px 10px;">

            <div class="logo" style="display: flex; align-items: center; gap: 12px;">

                <i class="fa-solid fa-wallet"></i>

                <div>

                    <h1 style="margin: 0; font-size: 1.4rem;">INSANE HR</h1>

                    <span style="font-size: 0.85rem; opacity: 0.8;">FinanceOS Cloud</span>

                </div>

            </div>

            <!-- Mobile-Optimized Action Control Bar -->
            <div class="themeBox" style="display: flex; flex-wrap: wrap; width: 100%; gap: 8px; justify-content: space-between; align-items: center;">

                <select id="theme" style="flex: 1 1 calc(50% - 4px); min-width: 100px; padding: 10px; box-sizing: border-box;">

                    <option value="dark">🌙 Dark</option>

                    <option value="light">☀️ Light</option>

                    <option value="red">❤️ Red</option>

                    <option value="blue">💙 Blue</option>

                    <option value="purple">💜 Purple</option>

                </select>

                <button id="logoutBtn" style="flex: 1 1 calc(25% - 4px); min-width: 75px; padding: 10px; white-space: nowrap;">

                    Logout

                </button>

                <!-- Secure Deletion Trigger Hooked into matching script.js ID entry -->
                <button id="deleteAccountBtn" style="background-color: #d9534f; color: white; flex: 1 1 calc(25% - 4px); min-width: 75px; padding: 10px; white-space: nowrap;">

                    Delete

                </button>

            </div>

        </header>

        <!-- DASHBOARD -->

        <section class="cards">

            <div class="card">

                <h3>Net Balance</h3>

                <h2 id="balance">₹0</h2>

            </div>

            <div class="card income">

                <h3>Total Income</h3>

                <h2 id="income">₹0</h2>

            </div>

            <div class="card expense">

                <h3>Total Expense</h3>

                <h2 id="expense">₹0</h2>

            </div>

            <div class="card saving">

                <h3>Savings</h3>

                <h2 id="saving">₹0 (0%)</h2>

                <div id="healthBadge" class="badge">

                    Awaiting Data

                </div>

            </div>

            <div class="card pending-summary-card">

                <h3>Pending</h3>

                <div class="pending-split-metrics">

                    <span class="incomeText">

                        In:
                        <strong id="pendingIncome">₹0</strong>

                    </span>

                    <span class="expenseText">

                        Out:
                        <strong id="pendingExpense">₹0</strong>

                    </span>

                </div>

            </div>

        </section>

        <!-- ENTRY FORMS -->

        <div class="finance-workspace">

            <section class="form">

                <h2>Add Transaction</h2>

                <input
                    type="text"
                    id="title"
                    placeholder="Transaction Name">

                <input
                    type="number"
                    id="amount"
                    placeholder="Amount">

                <select id="type">

                    <option value="income">

                        💰 Income

                    </option>

                    <option value="expense">

                        💸 Expense

                    </option>

                </select>

                <select id="category"></select>

                <select id="status">

                    <option value="paid">

                        ✅ Paid

                    </option>

                    <option value="pending">

                        ⏳ Pending

                    </option>

                </select>

                <button id="addBtn">

                    <i class="fa-solid fa-circle-plus"></i>

                    Add Transaction

                </button>

            </section>

            <section class="form">

                <h2>Categories</h2>

                <div class="categoryManager">

                    <input
                        id="newCategory"
                        placeholder="New Category">

                    <button id="addCategory">

                        +

                    </button>

                </div>

                <div id="categoryList"></div>

            </section>

        </div>

        <section class="search-filters">

            <div class="search-box">

                <i class="fa-solid fa-magnifying-glass"></i>

                <input
                    id="search"
                    placeholder="Search">

            </div>

            <div class="filter-box">

                <i class="fa-solid fa-filter"></i>

                <select id="filterCategory">

                    <option value="all">

                        All Categories

                    </option>

                </select>

            </div>

        </section>

        <!-- TRANSACTION HISTORY -->

        <section class="ledger">

            <h2>Transactions History</h2>

            <ul id="transactionList"></ul>

        </section>

        <footer>

            Made with ❤️ by <strong>INSANE HR</strong>

        </footer>

    </div>

   <!-- DIAGNOSTIC OVERRIDE BARRIER -->
    <script>
        console.log("💥 SYSTEM CHECK 1: HTML execution engine is alive.");
        window.onerror = function(message, source, lineno, colno, error) {
            alert("🔴 MODULE INITIALIZATION FAULT:\n" + message + "\nLine: " + lineno + "\nFile: " + source);
            return false;
        };
    </script>

    <!-- Finance Logic Engine -->
    <script type="module" src="script.js"></script>

</body>
</html>
